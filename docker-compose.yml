services:
  # SQL Server Database for all services
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: ${SQL_SA_PASSWORD:?SQL_SA_PASSWORD is required}
      ACCEPT_EULA: Y
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    networks:
      - app-network
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if [ -x /opt/mssql-tools18/bin/sqlcmd ]; then /opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"${SQL_SA_PASSWORD:?SQL_SA_PASSWORD is required}\" -Q \"SELECT 1\"; else /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"${SQL_SA_PASSWORD:?SQL_SA_PASSWORD is required}\" -Q \"SELECT 1\"; fi"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Elasticsearch Search Engine
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.enrollment.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    networks:
      - app-network
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Kibana UI for Elasticsearch
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - app-network

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:4.0-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?RABBITMQ_USER is required}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # Management UI
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Identity Service
  identity-service:
    build:
      context: .
      dockerfile: backend/identity-service/Api/Dockerfile
    container_name: identity-service
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORT: 80
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=IdentityServiceDb;User Id=sa;Password=${SQL_SA_PASSWORD:?SQL_SA_PASSWORD is required};TrustServerCertificate=True;MultipleActiveResultSets=true"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__Username: ${RABBITMQ_USER:?RABBITMQ_USER is required}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
    ports:
      - "7140:80"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Answer Service
  answer-service:
    build:
      context: .
      dockerfile: backend/answer-service/Api/Dockerfile
    container_name: answer-service
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORT: 80
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=AnswerServiceDb;User Id=sa;Password=${SQL_SA_PASSWORD:?SQL_SA_PASSWORD is required};TrustServerCertificate=True;MultipleActiveResultSets=true"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__Username: ${RABBITMQ_USER:?RABBITMQ_USER is required}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
    ports:
      - "7141:80"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Assessment Service
  assessment-service:
    build:
      context: .
      dockerfile: backend/assessment-service/Api/Dockerfile
    container_name: assessment-service
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORT: 80
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=AssessmentServiceDb;User Id=sa;Password=${SQL_SA_PASSWORD:?SQL_SA_PASSWORD is required};TrustServerCertificate=True;MultipleActiveResultSets=true"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__Username: ${RABBITMQ_USER:?RABBITMQ_USER is required}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
    ports:
      - "7142:80"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Candidate Service
  candidate-service:
    build:
      context: .
      dockerfile: backend/candidate-service/Api/Dockerfile
    container_name: candidate-service
    depends_on:
      sqlserver:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORT: 80
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=CandidateServiceDb;User Id=sa;Password=${SQL_SA_PASSWORD:?SQL_SA_PASSWORD is required};TrustServerCertificate=True;MultipleActiveResultSets=true"
      Elasticsearch__Url: "http://elasticsearch:9200"
      Elasticsearch__IndexName: "candidate-service-candidates"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__Username: ${RABBITMQ_USER:?RABBITMQ_USER is required}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
      ServiceUrls__AssessmentService: "http://assessment-service"
      ServiceUrls__ResultService: "http://result-service"
    ports:
      - "7143:80"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Result Service
  result-service:
    build:
      context: .
      dockerfile: backend/result-service/Api/Dockerfile
    container_name: result-service
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORT: 80
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=ResultServiceDb;User Id=sa;Password=${SQL_SA_PASSWORD:?SQL_SA_PASSWORD is required};TrustServerCertificate=True;MultipleActiveResultSets=true"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__Username: ${RABBITMQ_USER:?RABBITMQ_USER is required}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
      ServiceUrls__AnswerService: "http://answer-service"
      ServiceUrls__AssessmentService: "http://assessment-service"
    ports:
      - "7144:80"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: backend/api-gateway/Api/Dockerfile
    container_name: api-gateway
    depends_on:
      - identity-service
      - answer-service
      - assessment-service
      - candidate-service
      - result-service
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORT: 80
      ASPNETCORE_URLS: http://+:80
      ReverseProxy__Clusters__identity-cluster__Destinations__identity-service__Address: "http://identity-service"
      ReverseProxy__Clusters__answer-cluster__Destinations__answer-service__Address: "http://answer-service"
      ReverseProxy__Clusters__assessment-cluster__Destinations__assessment-service__Address: "http://assessment-service"
      ReverseProxy__Clusters__candidate-cluster__Destinations__candidate-service__Address: "http://candidate-service"
      ReverseProxy__Clusters__result-cluster__Destinations__result-service__Address: "http://result-service"
    ports:
      - "7080:80"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Angular Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: frontend
    depends_on:
      - api-gateway
    environment:
      API_URL: "http://api-gateway:80"
    ports:
      - "4200:80"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  app-network:
    driver: bridge

volumes:
  sqlserver-data:
  rabbitmq-data:
  elasticsearch-data:
