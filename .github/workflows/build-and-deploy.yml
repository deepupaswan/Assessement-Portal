name: Build and Deploy Containers

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_TAG: ${{ github.sha }}
  REGISTRY: ${{ secrets.REGISTRY_HOST || format('ghcr.io/{0}', github.repository_owner) }}
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME || github.actor }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD || github.token }}

jobs:
  determine-services:
    name: Determine Changed Services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_services: ${{ steps.set-matrix.outputs.has_services }}
      service_names: ${{ steps.set-matrix.outputs.service_names }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build service matrix
        id: set-matrix
        shell: bash
        run: |
          set -euo pipefail

          ALL_SERVICES='[
            {"name":"identity-service","dockerfile":"backend/identity-service/Api/Dockerfile","context":"."},
            {"name":"answer-service","dockerfile":"backend/answer-service/Api/Dockerfile","context":"."},
            {"name":"assessment-service","dockerfile":"backend/assessment-service/Api/Dockerfile","context":"."},
            {"name":"candidate-service","dockerfile":"backend/candidate-service/Api/Dockerfile","context":"."},
            {"name":"result-service","dockerfile":"backend/result-service/Api/Dockerfile","context":"."},
            {"name":"api-gateway","dockerfile":"backend/api-gateway/Api/Dockerfile","context":"."},
            {"name":"frontend","dockerfile":"frontend/Dockerfile","context":"."}
          ]'

          NOOP='[{"name":"__skip__","dockerfile":"","context":"."}]'
          ALL_SERVICE_NAMES='identity-service, answer-service, assessment-service, candidate-service, result-service, api-gateway, frontend'

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "matrix=$(echo "$ALL_SERVICES" | jq -c .)" >> "$GITHUB_OUTPUT"
            echo "has_services=true" >> "$GITHUB_OUTPUT"
            echo "service_names=$ALL_SERVICE_NAMES" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "matrix=$(echo "$ALL_SERVICES" | jq -c .)" >> "$GITHUB_OUTPUT"
            echo "has_services=true" >> "$GITHUB_OUTPUT"
            echo "service_names=$ALL_SERVICE_NAMES" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
          echo "Changed files:"
          echo "$CHANGED_FILES"

          declare -A selected=()
          build_all=false

          while IFS= read -r file; do
            [ -z "$file" ] && continue

            case "$file" in
              backend/identity-service/*)
                selected["identity-service"]=1
                ;;
              backend/answer-service/*)
                selected["answer-service"]=1
                ;;
              backend/assessment-service/*)
                selected["assessment-service"]=1
                ;;
              backend/candidate-service/*)
                selected["candidate-service"]=1
                ;;
              backend/result-service/*)
                selected["result-service"]=1
                ;;
              backend/api-gateway/*)
                selected["api-gateway"]=1
                ;;
              frontend/*)
                selected["frontend"]=1
                ;;
              backend/*|Dev.sln|docker-compose.yml|docker-compose.prod.yml|.dockerignore)
                build_all=true
                ;;
            esac
          done <<< "$CHANGED_FILES"

          if [ "$build_all" = "true" ]; then
            echo "matrix=$(echo "$ALL_SERVICES" | jq -c .)" >> "$GITHUB_OUTPUT"
            echo "has_services=true" >> "$GITHUB_OUTPUT"
            echo "service_names=$ALL_SERVICE_NAMES" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${#selected[@]}" -eq 0 ]; then
            echo "matrix=$(echo "$NOOP" | jq -c .)" >> "$GITHUB_OUTPUT"
            echo "has_services=false" >> "$GITHUB_OUTPUT"
            echo "service_names=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SELECTED_JSON="$(printf '%s\n' "${!selected[@]}" | jq -R . | jq -s .)"
          FILTERED="$(jq -c --argjson names "$SELECTED_JSON" '[.[] | select(.name as $n | $names | index($n))]' <<< "$ALL_SERVICES")"

          if [ "$FILTERED" = "[]" ]; then
            echo "matrix=$(echo "$NOOP" | jq -c .)" >> "$GITHUB_OUTPUT"
            echo "has_services=false" >> "$GITHUB_OUTPUT"
            echo "service_names=none" >> "$GITHUB_OUTPUT"
          else
            SERVICE_NAMES="$(jq -r 'map(.name) | sort | join(", ")' <<< "$FILTERED")"
            echo "matrix=$FILTERED" >> "$GITHUB_OUTPUT"
            echo "has_services=true" >> "$GITHUB_OUTPUT"
            echo "service_names=$SERVICE_NAMES" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: determine-services
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.determine-services.outputs.matrix) }}

    steps:
      - name: Build selection summary
        run: 'echo "Selected services: ${{ needs.determine-services.outputs.service_names }}"'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: matrix.name != '__skip__'
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        if: matrix.name != '__skip__'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Build and push image
        if: matrix.name != '__skip__'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ matrix.name }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ matrix.name }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ matrix.name }}:buildcache,mode=max

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    if: needs.determine-services.outputs.has_services == 'true' && secrets.DEPLOY_HOST != '' && secrets.DEPLOY_USER != '' && secrets.DEPLOY_SSH_KEY != '' && secrets.DEPLOY_PATH != ''
    needs:
      - determine-services
      - build-and-push

    steps:
      - name: Deploy selection summary
        run: 'echo "Deploying services: ${{ needs.determine-services.outputs.service_names }}"'

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"

            export REGISTRY="${{ env.REGISTRY }}"
            export IMAGE_TAG="${{ github.sha }}"

            echo "${{ env.REGISTRY_PASSWORD }}" | docker login "${{ env.REGISTRY }}" -u "${{ env.REGISTRY_USERNAME }}" --password-stdin

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

            for url in \
              "http://localhost:7080/health" \
              "http://localhost:7140/health" \
              "http://localhost:7141/health" \
              "http://localhost:7142/health" \
              "http://localhost:7143/health" \
              "http://localhost:7144/health"
            do
              echo "Checking $url"
              ok="false"
              for i in $(seq 1 30); do
                if curl -fsS "$url" > /dev/null; then
                  echo "Healthy: $url"
                  ok="true"
                  break
                fi
                sleep 5
              done

              if [ "$ok" != "true" ]; then
                echo "Health check failed for $url"
                exit 1
              fi
            done
