name: Build and Deploy Containers

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: identity-service
            dockerfile: backend/identity-service/Api/Dockerfile
            context: .
          - name: answer-service
            dockerfile: backend/answer-service/Api/Dockerfile
            context: .
          - name: assessment-service
            dockerfile: backend/assessment-service/Api/Dockerfile
            context: .
          - name: candidate-service
            dockerfile: backend/candidate-service/Api/Dockerfile
            context: .
          - name: result-service
            dockerfile: backend/result-service/Api/Dockerfile
            context: .
          - name: api-gateway
            dockerfile: backend/api-gateway/Api/Dockerfile
            context: .
          - name: frontend
            dockerfile: frontend/Dockerfile
            context: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.REGISTRY_HOST }}/${{ matrix.name }}:${{ github.sha }}
            ${{ secrets.REGISTRY_HOST }}/${{ matrix.name }}:latest
          cache-from: type=registry,ref=${{ secrets.REGISTRY_HOST }}/${{ matrix.name }}:buildcache
          cache-to: type=registry,ref=${{ secrets.REGISTRY_HOST }}/${{ matrix.name }}:buildcache,mode=max

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"

            export REGISTRY="${{ secrets.REGISTRY_HOST }}"
            export IMAGE_TAG="${{ github.sha }}"

            echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login "${{ secrets.REGISTRY_HOST }}" -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

            for url in \
              "http://localhost:7080/health" \
              "http://localhost:7140/health" \
              "http://localhost:7141/health" \
              "http://localhost:7142/health" \
              "http://localhost:7143/health" \
              "http://localhost:7144/health"
            do
              echo "Checking $url"
              ok="false"
              for i in $(seq 1 30); do
                if curl -fsS "$url" > /dev/null; then
                  echo "Healthy: $url"
                  ok="true"
                  break
                fi
                sleep 5
              done

              if [ "$ok" != "true" ]; then
                echo "Health check failed for $url"
                exit 1
              fi
            done
