name: Build and Deploy Containers

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_TAG: ${{ github.sha }}
  REGISTRY_HOST: ${{ secrets.REGISTRY_HOST || 'ghcr.io' }}
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME || github.actor }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD || github.token }}

jobs:
  determine-services:
    name: Determine Changed Services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_services: ${{ steps.set-matrix.outputs.has_services }}
      service_names: ${{ steps.set-matrix.outputs.service_names }}
      image_prefix: ${{ steps.image-prefix.outputs.IMAGE_PREFIX }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build service matrix
        id: set-matrix
        shell: bash
        run: |
          set -euo pipefail

          ALL_SERVICES='[
            {"name":"identity-service","dockerfile":"backend/identity-service/Api/Dockerfile","context":"."},
            {"name":"answer-service","dockerfile":"backend/answer-service/Api/Dockerfile","context":"."},
            {"name":"assessment-service","dockerfile":"backend/assessment-service/Api/Dockerfile","context":"."},
            {"name":"candidate-service","dockerfile":"backend/candidate-service/Api/Dockerfile","context":"."},
            {"name":"result-service","dockerfile":"backend/result-service/Api/Dockerfile","context":"."},
            {"name":"api-gateway","dockerfile":"backend/api-gateway/Api/Dockerfile","context":"."},
            {"name":"frontend","dockerfile":"frontend/Dockerfile","context":"."}
          ]'

          NOOP='[{"name":"__skip__","dockerfile":"","context":"."}]'
          ALL_SERVICE_NAMES='identity-service, answer-service, assessment-service, candidate-service, result-service, api-gateway, frontend'

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            {
              echo "matrix=$(echo "$ALL_SERVICES" | jq -c .)"
              echo "has_services=true"
              echo "service_names=$ALL_SERVICE_NAMES"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            {
              echo "matrix=$(echo "$ALL_SERVICES" | jq -c .)"
              echo "has_services=true"
              echo "service_names=$ALL_SERVICE_NAMES"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
          echo "Changed files:"
          echo "$CHANGED_FILES"

          declare -A selected=()
          build_all=false

          while IFS= read -r file; do
            [ -z "$file" ] && continue

            case "$file" in
              backend/identity-service/*)
                selected["identity-service"]=1
                ;;
              backend/answer-service/*)
                selected["answer-service"]=1
                ;;
              backend/assessment-service/*)
                selected["assessment-service"]=1
                ;;
              backend/candidate-service/*)
                selected["candidate-service"]=1
                ;;
              backend/result-service/*)
                selected["result-service"]=1
                ;;
              backend/api-gateway/*)
                selected["api-gateway"]=1
                ;;
              frontend/*)
                selected["frontend"]=1
                ;;
              backend/*|Dev.sln|docker-compose.yml|docker-compose.prod.yml|.dockerignore)
                build_all=true
                ;;
            esac
          done <<< "$CHANGED_FILES"

          if [ "$build_all" = "true" ]; then
            {
              echo "matrix=$(echo "$ALL_SERVICES" | jq -c .)"
              echo "has_services=true"
              echo "service_names=$ALL_SERVICE_NAMES"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${#selected[@]}" -eq 0 ]; then
            {
              echo "matrix=$(echo "$NOOP" | jq -c .)"
              echo "has_services=false"
              echo "service_names=none"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SELECTED_JSON="$(printf '%s\n' "${!selected[@]}" | jq -R . | jq -s .)"
          FILTERED="$(jq -c --argjson names "$SELECTED_JSON" '[.[] | select(.name as $n | $names | index($n))]' <<< "$ALL_SERVICES")"

          if [ "$FILTERED" = "[]" ]; then
            {
              echo "matrix=$(echo "$NOOP" | jq -c .)"
              echo "has_services=false"
              echo "service_names=none"
            } >> "$GITHUB_OUTPUT"
          else
            SERVICE_NAMES="$(jq -r 'map(.name) | sort | join(", ")' <<< "$FILTERED")"
            {
              echo "matrix=$FILTERED"
              echo "has_services=true"
              echo "service_names=$SERVICE_NAMES"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Set image prefix with lowercase repo
        id: image-prefix
        shell: bash
        run: |
          IMAGE_PREFIX="${{ secrets.IMAGE_PREFIX }}"
          if [ -z "$IMAGE_PREFIX" ]; then
            REGISTRY_HOST="${{ secrets.REGISTRY_HOST }}"
            if [ -z "$REGISTRY_HOST" ]; then
              REGISTRY_HOST="ghcr.io"
            fi
            REPO_LOWER="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
            IMAGE_PREFIX="${REGISTRY_HOST}/${REPO_LOWER}"
          fi
          echo "IMAGE_PREFIX=$IMAGE_PREFIX" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: determine-services
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.determine-services.outputs.matrix) }}

    steps:
      - name: Build selection summary
        run: 'echo "Selected services: ${{ needs.determine-services.outputs.service_names }}"'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: matrix.name != '__skip__'
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        if: matrix.name != '__skip__'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Build and push image
        if: matrix.name != '__skip__'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ needs.determine-services.outputs.image_prefix }}/${{ matrix.name }}:${{ github.sha }}
            ${{ needs.determine-services.outputs.image_prefix }}/${{ matrix.name }}:latest
          cache-from: type=registry,ref=${{ needs.determine-services.outputs.image_prefix }}/${{ matrix.name }}:buildcache
          cache-to: type=registry,ref=${{ needs.determine-services.outputs.image_prefix }}/${{ matrix.name }}:buildcache,mode=max

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    if: needs.determine-services.outputs.has_services == 'true'
    needs:
      - determine-services
      - build-and-push

    steps:
      - name: Check deploy configuration
        id: deploy-ready
        shell: bash
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ] || [ -z "${{ secrets.DEPLOY_USER }}" ] || [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ] || [ -z "${{ secrets.DEPLOY_PATH }}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Deploy secrets are not fully configured. Skipping deploy step."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy selection summary
        if: steps.deploy-ready.outputs.ready == 'true'
        run: 'echo "Deploying services: ${{ needs.determine-services.outputs.service_names }}"'

      - name: Deploy skipped summary
        if: steps.deploy-ready.outputs.ready != 'true'
        run: echo "Skipping deploy because DEPLOY_* secrets are missing."

      - name: Deploy over SSH
        if: steps.deploy-ready.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"

            # Load environment variables if .env file exists
            if [ -f .env ]; then
              set -a
              source .env
              set +a
            fi

            export REGISTRY="${{ needs.determine-services.outputs.image_prefix }}"
            export IMAGE_TAG="${{ github.sha }}"

            echo "${{ env.REGISTRY_PASSWORD }}" | docker login "${{ env.REGISTRY_HOST }}" -u "${{ env.REGISTRY_USERNAME }}" --password-stdin

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

            docker compose -f docker-compose.prod.yml ps

            for container in \
              "api-gateway" \
              "identity-service" \
              "answer-service" \
              "assessment-service" \
              "candidate-service" \
              "result-service"
            do
              echo "Checking container health: $container"
              ok="false"

              for i in $(seq 1 30); do
                status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container" 2>/dev/null || true)"

                if [ "$status" = "healthy" ]; then
                  echo "Healthy: $container"
                  ok="true"
                  break
                fi

                if [ "$status" = "exited" ] || [ "$status" = "dead" ]; then
                  echo "Container failed: $container (status=$status)"
                  docker logs --tail 100 "$container" || true
                  exit 1
                fi

                sleep 5
              done

              if [ "$ok" != "true" ]; then
                echo "Health check failed for container: $container"
                docker logs --tail 100 "$container" || true
                exit 1
              fi
            done
