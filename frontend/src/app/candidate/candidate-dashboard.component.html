<section class="mb-4">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <h2 class="mb-1">Candidate Workspace</h2>
      <p class="text-secondary mb-0">Start or resume assigned assessments with auto-save enabled.</p>
    </div>
    <button class="btn btn-outline-primary" type="button" (click)="loadAssignments()" [disabled]="loading">Refresh</button>
  </div>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <div class="card shadow-sm border-0">
    <div class="card-body">
      <h5 class="card-title">Assigned Assessments</h5>

      <div *ngIf="loading" class="text-secondary">Loading assignments...</div>

      <div class="table-responsive" *ngIf="!loading">
        <ag-grid-angular
          *ngIf="assignments.length; else noAssignments"
          class="ag-theme-quartz ag-grid-host"
          [rowData]="assignments"
          [columnDefs]="assignmentColumnDefs"
          [defaultColDef]="defaultColDef"
          [animateRows]="true"
          [pagination]="true"
          [paginationPageSize]="10"
          [suppressRowClickSelection]="true"
          (cellClicked)="onAssignmentCellClicked($event)">
        </ag-grid-angular>
      </div>

      <ng-template #noAssignments>
        <div class="alert alert-info mb-0">No assessments have been assigned yet.</div>
      </ng-template>
    </div>
  </div>
</section>
