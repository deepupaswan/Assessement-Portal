<div class="page-container">
  <div class="page-header">
    <div class="header-top">
      <div>
        <h1>Assessments</h1>
        <p class="page-subtitle">Manage and create assessments</p>
      </div>
      <button type="button" class="btn btn-primary" (click)="createAssessment()" title="Create new assessment">
        <i class="icon icon-plus"></i>
        <span>Create Assessment</span>
      </button>
    </div>
  </div>

  <div *ngIf="error" class="alert alert-error">
    <i class="icon icon-alert-circle"></i>
    <p>{{ error }}</p>
  </div>

  <div class="controls-bar">
    <div class="search-box">
      <i class="icon icon-search"></i>
      <input
        type="text"
        placeholder="Search assessments..."
        [(ngModel)]="searchTerm"
        class="search-input"
      >
    </div>

    <div class="filter-tabs">
      <button
        type="button"
        [class.active]="filterType === 'all'"
        (click)="filterType = 'all'"
        class="filter-tab"
      >
        All ({{ assessments.length }})
      </button>
      <button
        type="button"
        [class.active]="filterType === 'active'"
        (click)="filterType = 'active'"
        class="filter-tab"
      >
        Active
      </button>
      <button
        type="button"
        [class.active]="filterType === 'inactive'"
        (click)="filterType = 'inactive'"
        class="filter-tab"
      >
        Inactive
      </button>
    </div>
  </div>

  <div class="assessments-section">
    <div *ngIf="loading" class="loading-state">
      <div class="table-skeleton">
        <div class="skeleton-row header">
          <div class="skeleton-line short"></div>
          <div class="skeleton-line medium"></div>
          <div class="skeleton-line short"></div>
          <div class="skeleton-line short"></div>
          <div class="skeleton-line short"></div>
          <div class="skeleton-line short"></div>
          <div class="skeleton-line short"></div>
        </div>
        <div class="skeleton-row" *ngFor="let row of [1, 2, 3, 4]">
          <div class="skeleton-line medium"></div>
          <div class="skeleton-line long"></div>
          <div class="skeleton-chip"></div>
          <div class="skeleton-line short"></div>
          <div class="skeleton-chip short"></div>
          <div class="skeleton-line short"></div>
          <div class="skeleton-actions">
            <div class="skeleton-circle"></div>
            <div class="skeleton-circle"></div>
            <div class="skeleton-circle"></div>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="!loading && filteredAssessments.length === 0" class="empty-state">
      <i class="icon icon-file-text"></i>
      <h3>No assessments found</h3>
      <p *ngIf="searchTerm">
        Try adjusting your search or
        <button type="button" class="inline-link" (click)="searchTerm = ''">clear filters</button>
      </p>
      <p *ngIf="!searchTerm">
        <button type="button" class="btn btn-primary-outline" (click)="createAssessment()">
          Create your first assessment
        </button>
      </p>
    </div>

    <div *ngIf="!loading && filteredAssessments.length > 0" class="table-wrapper">
      <ag-grid-angular
        class="ag-theme-quartz ag-grid-host"
        [rowData]="filteredAssessments"
        [columnDefs]="assessmentColumnDefs"
        [defaultColDef]="defaultColDef"
        [animateRows]="true"
        [pagination]="true"
        [paginationPageSize]="10"
        [suppressRowClickSelection]="true"
        (cellClicked)="onAssessmentCellClicked($event)">
      </ag-grid-angular>
    </div>
  </div>
</div>
