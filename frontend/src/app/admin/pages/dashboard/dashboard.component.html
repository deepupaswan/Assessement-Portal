<div class="page-container">
  <div class="page-header">
    <h1>Dashboard</h1>
    <p class="page-subtitle">Welcome to the Admin Command Center</p>
  </div>

  <div class="dashboard-grid">
    <!-- KPI Cards -->
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-icon" style="background: #dbeafe;">
          <i class="icon icon-users" style="color: #0284c7;"></i>
        </div>
        <div class="kpi-content">
          <p class="kpi-label">Total Candidates</p>
          <h3 class="kpi-value">1,234</h3>
        </div>
      </div>

      <div class="kpi-card">
        <div class="kpi-icon" style="background: #dcfce7;">
          <i class="icon icon-trending-up" style="color: #16a34a;"></i>
        </div>
        <div class="kpi-content">
          <p class="kpi-label">Average Score</p>
          <h3 class="kpi-value">76.5%</h3>
        </div>
      </div>

      <div class="kpi-card">
        <div class="kpi-icon" style="background: #fef3c7;">
          <i class="icon icon-alert-circle" style="color: #d97706;"></i>
        </div>
        <div class="kpi-content">
          <p class="kpi-label">Suspicious Cases</p>
          <h3 class="kpi-value">12</h3>
        </div>
      </div>

      <div class="kpi-card">
        <div class="kpi-icon" style="background: #f3e8ff;">
          <i class="icon icon-check-circle" style="color: #7c3aed;"></i>
        </div>
        <div class="kpi-content">
          <p class="kpi-label">Completion Rate</p>
          <h3 class="kpi-value">89%</h3>
        </div>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions">
      <h2>Quick Actions</h2>
      <div class="action-buttons">
        <button class="action-btn">
          <i class="icon icon-plus"></i>
          <span>Create Assessment</span>
        </button>
        <button class="action-btn">
          <i class="icon icon-plus"></i>
          <span>Add Candidate</span>
        </button>
        <button class="action-btn">
          <i class="icon icon-send"></i>
          <span>Assign Assessment</span>
        </button>
        <button class="action-btn">
          <i class="icon icon-activity"></i>
          <span>View Live Progress</span>
        </button>
      </div>
    </div>

    <!-- Recent Activity -->
    <div class="recent-activity">
      <h2>Recent Activity</h2>
      <div class="activity-list">
        <div class="activity-item">
          <div class="activity-icon">
            <i class="icon icon-file-text"></i>
          </div>
          <div class="activity-content">
            <p class="activity-title">New assessment created</p>
            <p class="activity-desc">JavaScript Fundamentals</p>
            <span class="activity-time">2 hours ago</span>
          </div>
        </div>
        <div class="activity-item">
          <div class="activity-icon">
            <i class="icon icon-user-plus"></i>
          </div>
          <div class="activity-content">
            <p class="activity-title">New candidate registered</p>
            <p class="activity-desc">John Doe - john&#64;example.com</p>
            <span class="activity-time">4 hours ago</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
