<div class="page-container">
  <div class="page-header">
    <div class="header-copy">
      <h1>Live Monitoring</h1>
      <p class="page-subtitle">Monitor candidate assessments, proctor anomalies, and drill into individual sessions.</p>
    </div>

    <div class="header-actions">
      <span class="connection-pill" [ngClass]="'state-' + connectionState">
        {{ getConnectionLabel() }}
      </span>
      <button class="btn btn-secondary" type="button" (click)="refresh()" [disabled]="loading">
        Refresh
      </button>
    </div>
  </div>

  <div class="alert alert-error" *ngIf="error">
    {{ error }}
  </div>

  <app-alert-notification
    [alerts]="alerts"
    (inspect)="selectSession($event)"
    (dismiss)="dismissAlert($event)">
  </app-alert-notification>

  <div class="monitoring-grid">
    <section class="panel panel-wide">
      <div class="panel-header">
        <div>
          <h2>Active Sessions</h2>
          <p>{{ sessions.length }} sessions in the monitoring queue</p>
        </div>
      </div>

      <div class="loading-state" *ngIf="loading">
        <div class="table-skeleton">
          <div class="skeleton-row header">
            <span class="skeleton-line short"></span>
            <span class="skeleton-line short"></span>
            <span class="skeleton-line short"></span>
            <span class="skeleton-line short"></span>
          </div>
          <div class="skeleton-row" *ngFor="let item of [1,2,3,4,5]">
            <span class="skeleton-line medium"></span>
            <span class="skeleton-line medium"></span>
            <span class="skeleton-chip"></span>
            <span class="skeleton-line short"></span>
          </div>
        </div>
      </div>

      <div class="empty-state" *ngIf="!loading && sessions.length === 0">
        <p>No sessions are currently available for monitoring.</p>
      </div>

      <div class="table-wrap" *ngIf="!loading && sessions.length > 0">
        <ag-grid-angular
          class="ag-theme-quartz ag-grid-host"
          [rowData]="sessions"
          [columnDefs]="sessionColumnDefs"
          [defaultColDef]="defaultColDef"
          [animateRows]="true"
          [pagination]="true"
          [paginationPageSize]="10"
          [suppressRowClickSelection]="true"
          (cellClicked)="onSessionCellClicked($event)">
        </ag-grid-angular>
      </div>
    </section>

    <section class="side-stack">
      <app-proctoring-dashboard
        [sessions]="sessions"
        [alerts]="alerts"
        [selectedSessionId]="selectedSessionId"
        (inspectSession)="selectSession($event)">
      </app-proctoring-dashboard>

      <app-candidate-session-detail
        [session]="selectedSession"
        [alerts]="selectedSessionAlerts"
        (close)="clearSelection()">
      </app-candidate-session-detail>
    </section>
  </div>
</div>
