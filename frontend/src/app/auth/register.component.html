<div class="auth-page d-flex align-items-center justify-content-center min-vh-100 px-3 py-4">
  <div class="auth-card card w-100" style="max-width: 460px;">
    <div class="card-body">
      <div class="text-center mb-3">
        <img src="/assets/images/logo.svg" alt="Assessment Portal" style="height:44px;" />
      </div>

      <h3 class="h5 mb-1 text-center">Create account</h3>
      <p class="text-secondary text-center mb-4">Register as a candidate or admin to access the platform</p>

      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <div class="ui-form-field">
          <label for="name" class="form-label">Name</label>
          <input id="name" type="text" class="ui-form-control form-control" formControlName="name" [class.is-invalid]="form.get('name')?.invalid && form.get('name')?.touched">
          <div class="invalid-feedback" *ngIf="form.get('name')?.invalid && form.get('name')?.touched">Name is required.</div>
        </div>

        <div class="ui-form-field">
          <label for="email" class="form-label">Email</label>
          <input id="email" type="email" class="ui-form-control form-control" formControlName="email" [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched">
          <div class="invalid-feedback" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">Please enter a valid email.</div>
        </div>

        <div class="ui-form-field">
          <label for="password" class="form-label">Password</label>
          <input id="password" type="password" class="ui-form-control form-control" formControlName="password" [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched">
          <div class="invalid-feedback" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">Password is required.</div>
        </div>

        <div class="ui-form-field">
          <label class="form-label d-block">Register as</label>
          <div class="role-options d-grid gap-2">
            <label class="role-option form-check">
              <input class="form-check-input" type="radio" formControlName="role" value="Candidate">
              <span>
                <strong>Candidate</strong>
                <small class="text-secondary d-block">Take assessments and submit answers</small>
              </span>
            </label>

            <label class="role-option form-check">
              <input class="form-check-input" type="radio" formControlName="role" value="Admin">
              <span>
                <strong>Admin</strong>
                <small class="text-secondary d-block">Manage candidates, assessments, and reporting</small>
              </span>
            </label>
          </div>
          <small class="form-text text-secondary d-block mt-2">Selecting Admin may require backend approval.</small>
        </div>

        <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

        <button class="ui-btn ui-btn-primary w-100" type="submit" [disabled]="loading">
          <span *ngIf="!loading">Create account</span>
          <span *ngIf="loading">Creating account...</span>
        </button>
      </form>

      <p class="mt-3 mb-0 text-center text-secondary">Already have an account? <a routerLink="/auth/login">Sign in</a></p>
    </div>
  </div>
</div>
