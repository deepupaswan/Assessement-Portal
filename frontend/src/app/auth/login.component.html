<div class="auth-page d-flex align-items-center justify-content-center min-vh-100 px-3">
  <div class="auth-card card w-100" style="max-width:420px;">
    <div class="card-body">
      <div class="text-center mb-3">
        <img src="/assets/images/logo-signin.svg" alt="Assessment Portal" style="height:44px;" />
      </div>

      <h3 class="h5 mb-1 text-center">Welcome back</h3>
      <p class="text-secondary text-center mb-4">Sign in to continue to your assessment dashboard</p>

      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <div class="ui-form-field">
          <label for="email" class="form-label">Email</label>
          <input id="email" type="email" class="ui-form-control form-control" formControlName="email" [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched">
          <div class="invalid-feedback" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">Please enter a valid email.</div>
        </div>

        <div class="ui-form-field">
          <label for="password" class="form-label">Password</label>
          <input id="password" type="password" class="ui-form-control form-control" formControlName="password" [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched">
          <div class="invalid-feedback" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">Password is required.</div>
        </div>

        <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

        <button class="ui-btn ui-btn-primary w-100" type="submit" [disabled]="loading">
          <span *ngIf="!loading">Sign in</span>
          <span *ngIf="loading">Signing in...</span>
        </button>
      </form>

      <p class="mt-3 mb-0 text-center text-secondary">New user? <a routerLink="/auth/register">Create account</a></p>
    </div>
  </div>
</div>
