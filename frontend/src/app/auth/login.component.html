<div class="row justify-content-center pt-5">
  <div class="col-12 col-md-7 col-lg-5">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4 p-md-5">
        <h2 class="mb-1">Sign in</h2>
        <p class="text-secondary mb-4">Use your interview platform account.</p>

        <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input id="email" type="email" class="form-control" formControlName="email" [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched">
            <div class="invalid-feedback" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
              Please enter a valid email.
            </div>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input id="password" type="password" class="form-control" formControlName="password" [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched">
            <div class="invalid-feedback" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
              Password is required.
            </div>
          </div>

          <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

          <button class="btn btn-primary w-100" type="submit" [disabled]="loading">
            {{ loading ? 'Signing in...' : 'Sign in' }}
          </button>
        </form>

        <p class="mt-3 mb-0 text-secondary">
          New user?
          <a routerLink="/auth/register">Create account</a>
        </p>
      </div>
    </div>
  </div>
</div>
